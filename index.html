// Pinwheel image filenames — place these PNGs in a /pinwheels/ directory when deploying
const PINWHEEL_IMAGES = {
  green: "pinwheels/PINWHEEL_GREEN.png",
  orange: "pinwheels/PINWHEEL_ORGANGE.png",
  blue: "pinwheels/PINWHEEL_BLUE.png",
  purple: "pinwheels/PINWHEEL_PURPLE.png",
  pink: "pinwheels/PINWHEEL_PINK.png",
  yellow: "pinwheels/PINWHEEL_YELLOW.png",
};

function Pinwheel({ colorName, size, top, left, right, bottom, opacity = 0.35, rotation = 0 }) {
  const s = parseInt(size) || 120;
  const src = PINWHEEL_IMAGES[colorName] || PINWHEEL_IMAGES.green;
  return (
    <div style={{ position: "absolute", width: s, height: s, opacity, top, left, right, bottom, pointerEvents: "none", transform: `rotate(${rotation}deg)` }}>
      <img src={src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }} />
    </div>
  );
}

function ExtLink({ href, children, style = {} }) {
  return <a href={href} target="_blank" rel="noopener noreferrer" style={{ color: COLORS.royalBlue, textDecoration: "underline", fontWeight: 600, ...style }}>{children}</a>;
}

function Card({ children, style = {}, accent }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "20px 18px", marginBottom: 14, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", borderLeft: accent ? `5px solid ${accent}` : "none", ...style }}>
      {children}
    </div>
  );
}

function PageTitle({ children }) {
  return <h2 style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 26, fontWeight: 800, color: COLORS.darkBlue, margin: "0 0 18px 0", letterSpacing: -0.5 }}>{children}</h2>;
}

function SectionLabel({ children, color = COLORS.darkBlue }) {
  return <h3 style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 18, fontWeight: 700, color, margin: "20px 0 10px 0", textTransform: "uppercase", letterSpacing: 1 }}>{children}</h3>;
}

function CorridorMap() {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);

  useEffect(() => {
    if (mapInstance.current || !mapRef.current) return;

    const map = L.map(mapRef.current, { scrollWheelZoom: false, zoomControl: true }).setView([43.2580, -79.8352], 16);
    mapInstance.current = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    function zoneIcon(color) {
      return L.divIcon({ className: '', html: '<div style="width:22px;height:22px;border-radius:50%;background:'+color+';border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>', iconSize: [22, 22], iconAnchor: [11, 11] });
    }
    function smallDot(color) {
      return L.divIcon({ className: '', html: '<div style="width:12px;height:12px;border-radius:50%;background:'+(color||"#999")+';border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>', iconSize: [12, 12], iconAnchor: [6, 6] });
    }
    function labelIcon(emoji, bg) {
      return L.divIcon({ className: '', html: '<div style="width:20px;height:20px;border-radius:50%;background:'+(bg||"#666")+';border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;">'+emoji+'</div>', iconSize: [20, 20], iconAnchor: [10, 10] });
    }

    var zones = [
      [43.2600, -79.8333, "Cotton Factory", "270 Sherman Ave N. Flux Bazaar (~25 vendors), Born to Eat food truck out front.", "#A8E10C"],
      [43.2587, -79.8345, "Hamilton Craft Studios", "121 Princess St. Maker's market (3rd floor), clothing swap, garment mending clinic, furniture repair clinic, craft zone, Music to Draw To. Galaxy Burger + Real Fruity (outside), Thirds Coffee (3rd floor).", "#FF8C00"],
      [43.2573, -79.8360, "Playhouse & Pinch", "177-183 Sherman Ave N. Zootopia screening (10am-12pm), Paul Fralick (10:30-11:30am), Scholastic activities (9:30am-12:30pm), storytime with Parkette (9:30-10:30am), Cake Picnic (12:30-2pm), seedling sale, Humble Bee, hygiene drive + lawn games.", "#FF1493"],
      [43.2570, -79.8378, "Earl St Lot", "Barton St E at Earl St. Planting planters, new mural by Lucky Bones, hammocks, games, cornhole, and music.", "#1A1AE8"]
    ];
    zones.forEach(function(z) {
      L.marker([z[0], z[1]], { icon: zoneIcon(z[4]) }).addTo(map).bindPopup('<b style="color:'+z[4]+'">'+z[2]+'</b><br><span style="font-size:12px;">'+z[3]+'</span>');
    });

    var businesses = [
      [43.2569, -79.8371, "Hotties SmashBurgers", "657 Barton St E"],
      [43.2568, -79.8370, "Vero Gallery Café", "659 Barton St E"],
      [43.2568, -79.8369, "Hendry's Barbershop", "661 Barton St E"],
      [43.2570, -79.8367, "Burdin's Comics", "665 Barton St E (alley — gravel path)"],
      [43.2567, -79.8364, "Helping Hands + Baby Depot", "669 Barton St E — hygiene drive + lawn games at Playhouse & Pinch lot"],
      [43.2572, -79.8362, "Epic Books: The Sequel", "177 Sherman Ave N"]
    ];
    businesses.forEach(function(b) {
      L.marker([b[0], b[1]], { icon: smallDot() }).addTo(map).bindPopup('<b>'+b[2]+'</b><br><span style="font-size:12px;">'+b[3]+'</span>');
    });

    L.marker([43.2605, -79.8329], { icon: labelIcon('P', '#555') }).addTo(map).bindPopup('<b>Emterra Lot (FREE)</b><br><span style="font-size:12px;">15 Biggar Ave</span>');
    L.marker([43.2568, -79.8355], { icon: labelIcon('P', '#555') }).addTo(map).bindPopup('<b>Municipal Car Park #64 (FREE)</b><br><span style="font-size:12px;">176 Sherman Ave N — free thanks to Ward 3 Community Grant</span>');
    L.marker([43.2578, -79.8334], { icon: labelIcon('🌳', '#5DCAA5') }).addTo(map).bindPopup('<b>Lucy Day Park</b><br><span style="font-size:12px;">33 Clinton St — quiet space / sensory break</span>');
    L.marker([43.2600, -79.8331], { icon: labelIcon('🚲', '#4BB8F0') }).addTo(map).bindPopup('<b>SoBi: 270 Sherman</b><br><span style="font-size:12px;">272 Sherman Ave N (near Cotton Factory)</span>');
    L.marker([43.2559, -79.8366], { icon: labelIcon('🚲', '#4BB8F0') }).addTo(map).bindPopup('<b>SoBi: Sherman at Barton (ERI02)</b><br><span style="font-size:12px;">141-147 Sherman Ave N</span>');

    setTimeout(function() { map.invalidateSize(); }, 200);
  }, []);

  return (
    <div style={{ borderRadius: 16, overflow: "hidden", marginBottom: 18, border: "2px solid " + COLORS.darkBlue }}>
      <div ref={mapRef} style={{ width: "100%", height: 400 }}></div>
      <div style={{ background: COLORS.darkBlue, padding: "8px 12px", display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
        {[
          { color: "#A8E10C", label: "Cotton Factory" },
          { color: "#FF8C00", label: "HCS" },
          { color: "#FF1493", label: "Playhouse & Pinch" },
          { color: "#1A1AE8", label: "Earl St Lot" },
        ].map(function(l) {
          return React.createElement("span", { key: l.label, style: { display: "flex", alignItems: "center", gap: 4 } },
            React.createElement("span", { style: { width: 10, height: 10, borderRadius: "50%", background: l.color, display: "inline-block" } }),
            React.createElement("span", { style: { fontFamily: "'League Spartan', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.7)" } }, l.label)
          );
        })}
      </div>
    </div>
  );
}

        <p style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 17, fontWeight: 800, color: COLORS.darkBlue, margin: "0 0 6px" }}>How was your day?</p>
        <p style={{ fontFamily: "'Futura', sans-serif", fontSize: 14, color: "#555", margin: "0 0 10px", lineHeight: 1.4 }}>We'd love your feedback — it takes about a minute.</p>
        {EVENT_INFO.feedbackFormUrl ? (
          <ExtLink href={EVENT_INFO.feedbackFormUrl} style={{ fontSize: 15, color: COLORS.hotPink }}>Share feedback →</ExtLink>
        ) : (
          <p style={{ fontFamily: "'Futura', sans-serif", fontSize: 13, color: "#aaa", margin: 0, fontStyle: "italic" }}>Feedback form coming soon!</p>
        )}
      </Card>

      <Card>
        <p style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 17, fontWeight: 800, color: COLORS.darkBlue, margin: "0 0 6px" }}>Follow along</p>
        <ExtLink href={EVENT_INFO.instagramUrl} style={{ fontSize: 15 }}>{EVENT_INFO.instagram}</ExtLink>
      </Card>
    </div>
  );
}

// ─── App Shell ──────────────────────────────────────────

const PAGES = {
  home: { component: HomePage, title: "Home" },
  schedule: { component: SchedulePage, title: "Schedule" },
  zones: { component: ZonesPage, title: "Zones" },
  food: { component: FoodPage, title: "Food & Drink" },
  kids: { component: KidsPage, title: "Kids & Families" },
  businesses: { component: BusinessesPage, title: "Businesses" },
  "getting-there": { component: GettingTherePage, title: "Getting There" },
  faqs: { component: FAQsPage, title: "FAQs" },
  contact: { component: ContactPage, title: "Contact" },
};

function App() {
  const [page, setPage] = useState("home");
  const goTo = (p) => { setPage(p); window.scrollTo(0, 0); };
  const CurrentPage = PAGES[page].component;

  return (
    <div style={{ fontFamily: "'Futura', 'League Spartan', Helvetica, sans-serif", maxWidth: 420, margin: "0 auto", background: COLORS.offWhite, minHeight: "100vh", position: "relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

      {/* Header (non-home pages) */}
      {page !== "home" && (
        <div style={{ position: "sticky", top: 0, zIndex: 100, background: COLORS.darkBlue, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => goTo("home")} style={{ background: "none", border: "none", color: "#fff", fontSize: 20, cursor: "pointer", padding: "0 4px", fontWeight: 700 }}>←</button>
          <span style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 17, fontWeight: 700, color: "#fff" }}>{PAGES[page].title}</span>
          <span style={{ marginLeft: "auto", fontFamily: "'League Spartan', sans-serif", fontSize: 11, fontWeight: 600, color: COLORS.hotPink, textTransform: "uppercase", letterSpacing: 1 }}>SSP 2026</span>
        </div>
      )}

      {/* Page content */}
      <div style={{ padding: page === "home" ? 0 : "20px 16px 100px" }}>
        {page === "home" ? <CurrentPage goTo={goTo} /> : <CurrentPage />}
      </div>

      {/* Bottom nav (non-home pages) */}
      {page !== "home" && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 420, background: "#fff", borderTop: "1px solid #eee", display: "flex", justifyContent: "space-around", padding: "10px 0 14px", zIndex: 100 }}>
          {[
            { emoji: "🏠", label: "Home", p: "home" },
            { emoji: "📅", label: "Schedule", p: "schedule" },
            { emoji: "📍", label: "Zones", p: "zones" },
            { emoji: "🍔", label: "Food", p: "food" },
            { emoji: "❓", label: "FAQs", p: "faqs" },
          ].map((n) => (
            <button
              key={n.p}
              onClick={() => goTo(n.p)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                opacity: page === n.p ? 1 : 0.5,
              }}
            >
              <span style={{ fontSize: 18 }}>{n.emoji}</span>
              <span style={{ fontFamily: "'League Spartan', sans-serif", fontSize: 10, fontWeight: 700, color: COLORS.darkBlue }}>{n.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}


    // ─── Mount the app ──────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
